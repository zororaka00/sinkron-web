<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title & Description for SEO -->
    <title>Sinkron Skills - Explore Innovative ClawHub Skills by Web3 Hungry</title>
    <meta name="description"
        content="Discover a showcase of amazing AI-powered skills created by Web3 Hungry on ClawHub. Explore utilities for finance, productivity, privacy, and more.">

    <!-- Keywords for SEO (optional, but can help with older engines) -->
    <meta name="keywords"
        content="ClawHub skills, AI tools, Web3 Hungry, temporary email, stock scraper, IDX profile, automation, privacy">

    <!-- Robots Meta Tag (allow indexing) -->
    <meta name="robots" content="index, follow">

    <!-- Canonical URL (replace with actual URL) -->
    <link rel="canonical" href="https://www.sinkron.id/">

    <!-- Favicon (add your favicon files) -->
    <link rel="icon" href="logo.png" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="logo.png">

    <!-- Open Graph Meta Tags for Social Sharing (Facebook, LinkedIn, etc.) -->
    <meta property="og:title" content="Sinkron Skills - Explore Amazing ClawHub Skills">
    <meta property="og:description"
        content="A curated showcase of innovative skills built by Web3 Hungry, including MailTap for temporary emails and IDX Stock for company profiles.">
    <meta property="og:image" content="https://www.sinkron.id/og-logo.jpg"> <!-- Replace with actual image URL -->
    <meta property="og:url" content="https://www.sinkron.id/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Sinkron.id">

    <!-- Twitter/X Meta Tags for Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sinkron Skills - ClawHub Showcase by Web3 Hungry">
    <meta name="twitter:description" content="Explore AI skills for productivity and finance, created by @web3hungry.">
    <meta name="twitter:image" content="https://www.sinkron.id/og-logo.jpg">
    <!-- Replace with actual image URL -->
    <meta name="twitter:site" content="@web3hungry"> <!-- Your X handle -->
    <meta name="twitter:creator" content="@web3hungry">

    <!-- Additional SEO Enhancements -->
    <meta name="author" content="Web3 Hungry">
    <meta name="theme-color" content="#1a1a2e"> <!-- Matches template background -->

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Sinkron Skills</h1>
        <p>Explore amazing skills created by Web3 Hungry</p>
    </header>

    <section class="search-section">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search skills...">
            <span class="search-icon">🔍</span>
        </div>
    </section>

    <main class="skills-grid" id="skillsGrid">
        <!-- Skills will be dynamically inserted here from skills.json -->
    </main>

    <footer>
        <p class="creator">
            Created by <a href="https://clawhub.ai/u/zororaka00" target="_blank">Web3 Hungry</a>
        </p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
